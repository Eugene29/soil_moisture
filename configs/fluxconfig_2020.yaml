model:
  name: "Base_Flux"
  n_channel: 6
  embed_dim: 1024
  patch_size:
      - 1
      - 16
      - 16
  num_heads: 16
  mlp_ratio: 4
  depth: 24
  head_dropout: 0.2
device_name: "cuda"
n_iteration: 50
training:
  train_batch_size: 16
  shuffle: True
  optimizer:
    name: "AdamW"
    lr: 1.0e-3
    # lr: 5.0e-5
    params:
      # weight_decay: 1.0
      weight_decay: 1.0e-4
  scheduler:           # not used by train.py yet
    use: 1
    name: "ReduceLROnPlateau"
  dropout:             # not used by train.py yet (see model.head_dropout instead)
    use: 1
    val: 0.2
  bn: 1                # not used by train.py yet
testing:
  test_batch_size: 16
  shuffle: True
normalization: "z-score-std"
T_HLS: 1          # int, number of HLS frames per window (single-frame SM uses 1)
T_MERRA: 1        # int, number of MERRA frames per window (single-frame SM uses 1)
seed: 0
modality: "both"   # one of: hls | merra | both -- which data source(s) to use
data:
  # Soil-moisture (SM) data. Normalization stats are computed at runtime from the
  # train split (see train.py: compute_sm_stats) and written to the run's output dir.
  # 2020-only experiment. The 2020 chips live inside the combined chips_root; the
  # 2020 master CSV restricts loading to 2020 rows.
  master_csv: "/net/arch-lauprs2.arch.tamu.edu/tank/mercury/eku/data/soil-moisture/ISMN/azads/master_sm_hls_tx_2020.csv"
  chips_root: "/net/arch-lauprs2.arch.tamu.edu/tank/mercury/eku/data/soil-moisture/HLS/tx_ismn_2015_2025"
  merra_root: "/net/arch-lauprs2.arch.tamu.edu/tank/mercury/eku/data/soil-moisture/MERRA2/merra2_tx_2020"
  test_fraction: 0.2
  input_size: [6,50, 50]
logging:
  checkpoint_dir: "/home/yjean234/Prithvi-EO-2.0/examples/carbon_flux/logs/"
  metrics_dir: "/home/yjean234/Prithvi-EO-2.0/examples/carbon_flux/logs/"
  plots_dir: "/home/yjean234/Prithvi-EO-2.0/examples/carbon_flux/logs/"
