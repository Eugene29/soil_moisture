model:
  name: "Base_Flux"
  n_channel: 6
  embed_dim: 1024
  patch_size:
      - 1
      - 16
      - 16
  num_heads: 16
  mlp_ratio: 4
  depth: 24
  head_dropout: 0.2
device_name: "cuda"
n_iteration: 50
training:
  train_batch_size: 16
  shuffle: True
  optimizer:
    name: "AdamW"
    params:
      lr: 5e-5
  scheduler:
    use: 1
    name: "ReduceLROnPlateau"
  dropout:
    use: 1
    val: 0.2
  bn: 1
testing:
  test_batch_size: 16
  shuffle: False
normalization: "z-score-std"
# Resolved per-run by the runner (see train.py); placeholders here document the shape.
T_HLS:            # int, number of HLS frames per window (single-frame SM uses 1)
T_MERRA:          # int, number of MERRA frames per window (single-frame SM uses 1)
data:
  # Soil-moisture (SM) data. Normalization stats are computed at runtime from the
  # train split (see train.py: compute_sm_stats) and written to the run's output dir.
  master_csv: "/net/arch-lauprs2.arch.tamu.edu/tank/mercury/eku/data/master_sm_hls_tx_2020.csv"
  chips_root: "/net/arch-lauprs2.arch.tamu.edu/tank/mercury/eku/data/HLS/tx_ismn_2020"
  merra_root: "/net/arch-lauprs2.arch.tamu.edu/tank/mercury/eku/data/MERRA2/merra2_tx_2020"
  test_fraction: 0.2
  input_size: [6,50, 50]
logging:
  checkpoint_dir: "/home/yjean234/Prithvi-EO-2.0/examples/carbon_flux/logs/"
  metrics_dir: "/home/yjean234/Prithvi-EO-2.0/examples/carbon_flux/logs/"
  plots_dir: "/home/yjean234/Prithvi-EO-2.0/examples/carbon_flux/logs/"
  
